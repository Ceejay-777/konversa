services:
  redis:
    image: redis:7-alpine
    container_name: konversa_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - redis
    command: python manage.py runserver 0.0.0.0:8000


  celery:
    build: .
    command: celery -A konversa worker --loglevel=info -E
    volumes:
      - .:/app
    environment:
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - redis

  flower:
    build: .
    command: celery -A konversa flower --port=5555
    ports:
      - "5555:5555"
    volumes:
      - .:/app
    environment:
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - redis
      - celery

volumes:
  redis_data: